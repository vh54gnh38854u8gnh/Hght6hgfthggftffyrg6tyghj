<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booth :D</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div id="lobby" class="w-full max-w-md bg-gray-800 p-6 rounded-lg shadow-lg text-center">
        <h1 class="text-2xl font-bold text-green-400 mb-4">Booth</h1>
        <p class="text-sm text-gray-400 mb-2">My ID: <span id="my-id" class="font-mono text-white font-bold">Loading...</span></p>
        <div class="flex gap-2 mb-4">
            <input type="text" id="remote-id" placeholder="Enter Others ID" class="w-full bg-gray-700 text-white p-2 rounded outline-none">
            <button id="connect-btn" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded font-bold">Connect</button>
        </div>
        <p id="status" class="text-sm text-gray-400">Waiting to connect...</p>
    </div>

    <div id="booth" class="hidden w-full max-w-4xl flex flex-col items-center">
        <div class="flex gap-4 mb-4">
            <div class="relative">
                <span class="absolute top-2 left-2 bg-black/60 px-2 py-1 text-xs rounded">You</span>
                <video id="local-video" autoplay muted playsinline class="w-[400px] bg-black rounded border-2 border-gray-700 transform -scale-x-100"></video>
            </div>
            <div class="relative">
                <span class="absolute top-2 left-2 bg-black/60 px-2 py-1 text-xs rounded text-green-400">Others</span>
                <video id="remote-video" autoplay playsinline class="w-[400px] bg-black rounded border-2 border-green-500"></video>
            </div>
        </div>

        <!-- Camera switch for cousin side -->
        <div class="flex items-center gap-3 mt-2">
            <select id="cousin-camera-select" class="bg-gray-700 text-white p-3 rounded-lg text-sm flex-1"></select>
            <button id="cousin-switch-camera-button" class="bg-gray-600 hover:bg-gray-500 px-6 py-3 rounded-lg font-medium">Switch Camera</button>
        </div>

        <div id="countdown" class="text-8xl font-black hidden mt-6"></div>
    </div>

    <div id="result" class="hidden flex flex-col items-center">
        <canvas id="strip-canvas" class="mb-4 rounded shadow-2xl bg-white"></canvas>
        <button id="download-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded font-bold">Download Strip</button>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>

<script>
    const peer = new Peer("eid-other-" + Math.floor(Math.random() * 10000));
    let conn, localStream, activeCall = null;
    let photosTaken = [];

    // ====================== CAMERA (with replaceTrack) ======================
    async function populateCousinCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const select = document.getElementById('cousin-camera-select');
        select.innerHTML = '';
        videoDevices.forEach((dev, i) => {
            const opt = document.createElement('option');
            opt.value = dev.deviceId;
            opt.textContent = dev.label || `Camera ${i+1}`;
            select.appendChild(opt);
        });
    }

    async function startCousinCamera(deviceId = null) {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = await navigator.mediaDevices.getUserMedia({
                video: deviceId 
                    ? { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } } 
                    : { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            document.getElementById('local-video').srcObject = localStream;
    
            if (activeCall && activeCall.peerConnection) {
                const sender = activeCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) await sender.replaceTrack(localStream.getVideoTracks()[0]);
            }
        }

    // ====================== PEER SETUP ======================
    peer.on('open', async (id) => {
            document.getElementById('my-id').innerText = id;
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            document.getElementById('local-video').srcObject = localStream;
            await populateCousinCameras();
        });

    peer.on('connection', c => { conn = c; setupDataHandlers(); });

    peer.on('call', call => {
        activeCall = call;
        call.answer(localStream);
        call.on('stream', stream => setupRemoteVideo(stream));
    });

    document.getElementById('connect-btn').onclick = async () => {
        const remoteId = document.getElementById('remote-id').value.trim();
        if (!remoteId) return;
        conn = peer.connect(remoteId);
        setupDataHandlers();

        const call = peer.call(remoteId, localStream);
        activeCall = call;
        call.on('stream', stream => setupRemoteVideo(stream));
    };

    function setupRemoteVideo(stream) {
        document.getElementById('remote-video').srcObject = stream;
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('booth').classList.remove('hidden');
        document.getElementById('status').innerText = "Connected!";
    }

    function setupDataHandlers() {
        conn.on('data', data => {
            if (data.type === 'start-session') runSequence(data.count);
        });
    }

    // ====================== SEQUENCE & CAPTURE ======================
    async function runSequence(count) {
        const cd = document.getElementById('countdown');
        cd.classList.remove('hidden');
        photosTaken = [];
        for (let i = 0; i < count; i++) {
            for (let s = 3; s > 0; s--) {
                cd.innerText = s;
                await new Promise(r => setTimeout(r, 1000));
            }
            cd.innerText = "Cheese!";
            captureSideBySide();
            await new Promise(r => setTimeout(r, 500));
        }
        cd.classList.add('hidden');
        generateStrip();
    }

    function drawVideoCover(ctx, video, x, y, w, h, flip = false) {
            if (!video.videoWidth) return;
            const vidRatio = video.videoWidth / video.videoHeight;
            const targetRatio = w / h;
            let drawW = w, drawH = h;
    
            if (vidRatio > targetRatio) drawW = h * vidRatio;
            else drawH = w / vidRatio;
    
            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();
    
            ctx.translate(x + w / 2, y + h / 2);
            if (flip) ctx.scale(-1, 1);
            ctx.drawImage(video, -drawW / 2, -drawH / 2, drawW, drawH);
            ctx.restore();
        }
    
        function captureSideBySide() {
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            const lv = document.getElementById('local-video'); // You
            const rv = document.getElementById('remote-video'); // Host
    
            const isDuo = rv && rv.srcObject;
    
            if (isDuo) {
                canvas.width = 3840; 
                canvas.height = 1080;
                drawVideoCover(ctx, rv, 0, 0, 1920, 1080, false); // Host on Left
                drawVideoCover(ctx, lv, 1920, 0, 1920, 1080, true);  // You on Right (mirrored)
            } else {
                canvas.width = 1920;
                canvas.height = 1080;
                drawVideoCover(ctx, lv, 0, 0, 1920, 1080, true); // You only (mirrored)
            }
    
            photosTaken.push(canvas.toDataURL('image/jpeg', 1.0)); // 1.0 Max Quality
        }

    function generateStrip() {
            const canvas = document.getElementById('strip-canvas');
            const ctx = canvas.getContext('2d');
            const pad = 60, pw = 1800, banner = 350;
    
            const promises = photosTaken.map((src, i) => new Promise(res => {
                const img = new Image();
                img.onload = () => res({ img, index: i });
                img.src = src;
            }));
    
            Promise.all(promises).then(results => {
                results.sort((a, b) => a.index - b.index);
                const images = results.map(r => r.img);
    
                const aspectRatio = images[0].height / images[0].width;
                const ph = pw * aspectRatio; 
    
                canvas.width = pw + pad * 2;
                canvas.height = (ph * images.length) + pad * (images.length + 1) + banner;
    
                ctx.fillStyle = "white"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
    
                images.forEach((img, i) => {
                    ctx.drawImage(img, pad, pad + i * (ph + pad), pw, ph);
                });
    
                finishStrip(ctx, canvas, banner);
            });
        }
    
        function finishStrip(ctx, canvas, banner) {
            const by = canvas.height - banner;
            ctx.fillStyle = "#064e3b";
            ctx.fillRect(0, by, canvas.width, banner);
            
            ctx.fillStyle = "#fbbf24";
            ctx.textAlign = "center";
            ctx.font = "bold 100px sans-serif";
            ctx.fillText("Selamat Idul Fitri", canvas.width / 2, by + 150);
            ctx.font = "60px sans-serif";
            ctx.fillText("1447H", canvas.width / 2, by + 250);
            
            document.getElementById('booth').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
        }
    
        document.getElementById('download-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = `eid-strip-${Date.now()}.jpg`;
            link.href = document.getElementById('strip-canvas').toDataURL('image/jpeg', 1.0); // Output 1.0 Max Quality
            link.click();
        };

    // ====================== COUSIN CAMERA SWITCH ======================
    document.getElementById('cousin-switch-camera-button').addEventListener('click', () => {
        const select = document.getElementById('cousin-camera-select');
        if (select.options.length > 1) {
            let idx = (select.selectedIndex + 1) % select.options.length;
            select.selectedIndex = idx;
            startCousinCamera(select.value);
        }
    });

    document.getElementById('cousin-camera-select').addEventListener('change', () => {
        startCousinCamera(document.getElementById('cousin-camera-select').value);
    });
</script>
</body>
</html>
